<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>RetroZone – Rejestracja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Załóż konto w RetroZone i korzystaj z pełnych możliwości sklepu.">
  <meta name="keywords" content="rejestracja, konto, retrozone, sklep retro">
  <meta property="og:title" content="RetroZone – Rejestracja">
  <meta property="og:description" content="Załóż konto w RetroZone.">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo">RetroZone</a>
  <div class="search-box">
    <select aria-label="Kategoria">
      <option>Wszystkie kategorie</option>
      <option>Konsole retro</option>
      <option>Gry</option>
      <option>Akcesoria</option>
      <option>Nowości</option>
      <option>Promocje</option>
      <option>Kolekcjonerskie</option>
    </select>
    <input type="text" placeholder="Szukaj konsoli, gry lub akcesoriów..." aria-label="Szukaj">
    <button>Szukaj</button>
  </div>
  <div class="header-links">
    <a href="login.html">Moje konto</a>
    <a href="#">Zamówienia</a>
    <a href="cart.html">Koszyk (0)</a>
  </div>
</header>

<nav>
  <a href="products.html">Konsole retro</a>
  <a href="products.html">Gry</a>
  <a href="products.html">Akcesoria</a>
  <a href="products.html">Nowości</a>
  <a href="products.html">Promocje</a>
  <a href="products.html">Kolekcjonerskie</a>
</nav>

<main class="auth-container">
  <h2 style="text-align:center;margin-bottom:30px;">Załóż konto</h2>
  <form>
    <label>Imię i nazwisko<br><input type="text" required class="form-input"></label>
    <label>Email<br><input type="email" required class="form-input"></label>
    <label>Hasło<br><input type="password" required class="form-input"></label>
    <label>Powtórz hasło<br><input type="password" required class="form-input"></label>
    <button type="submit" class="btn auth-btn">Zarejestruj się</button>
  </form>
  <p style="text-align:center;margin-top:25px;">
    Masz już konto? <a href="login.html" style="color:#66fcf1;">Zaloguj się</a>
  </p>
</main>

<footer>
  &copy; 2026 RetroZone – wszystkie prawa zastrzeżone.
</footer>
</body>
</html>
