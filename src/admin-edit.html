<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Panel admina – Edycja produktu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Edycja istniejącego produktu w panelu administratora RetroZone.">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="admin-header">
  <a href="index.html" class="logo">RetroZone – Admin</a>
  <nav class="admin-nav">
    <a href="admin-products.html">Produkty</a>
    <a href="admin-orders.html">Zamówienia</a>
    <a href="admin-edit.html" class="active">Edycja produktu</a>
  </nav>
  <a href="index.html" class="btn admin-btn">Przejdź do sklepu</a>
</header>

<main>
  <h2>Edycja produktu</h2>
  <form class="admin-form">
    <label>Nazwa produktu:<br><input type="text" value="NES Classic Edition"></label>
    <label>Opis:<br><textarea rows="4">30 klasycznych gier, HDMI, oryginalny design.</textarea></label>
    <label>Cena (zł):<br><input type="number" value="399"></label>
    <label>Kategoria:<br>
      <select><option selected>Konsole</option><option>Gry</option><option>Akcesoria</option></select>
    </label>
    <label>Ilość:<br><input type="number" value="12"></label>
    <label>Zdjęcie:<br><input type="file"></label>
    <div class="admin-actions">
      <a href="admin-products.html" class="btn admin-btn">Zapisz zmiany</a>
      <a href="admin-products.html" class="btn cancel-btn">Anuluj</a>
    </div>
  </form>
</main>

<footer>Panel administratora RetroZone</footer>
</body>
</html>
