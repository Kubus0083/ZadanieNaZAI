<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>RetroZone – Lista produktów</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Przeglądaj retro konsole, gry i akcesoria w RetroZone.">

<body>

<header>
  <a href="index.html" class="logo">RetroZone</a>
  <div class="search-box">
    <select aria-label="Kategoria">
      <option>Wszystkie kategorie</option>
      <option>Konsole retro</option>
      <option>Gry</option>
      <option>Akcesoria</option>
      <option>Nowości</option>
      <option>Promocje</option>
      <option>Kolekcjonerskie</option>
    </select>
    <input type="text" placeholder="Szukaj konsoli, gry lub akcesoriów..." aria-label="Szukaj">
    <button>Szukaj</button>
  </div>
  <div class="header-links">
    <a href="login.html">Moje konto</a>
    <a href="#">Zamówienia</a>
    <a href="cart.html">Koszyk (0)</a>
  </div>
</header>

<nav>
  <a href="products.html">Konsole retro</a>
  <a href="products.html">Gry</a>
  <a href="products.html">Akcesoria</a>
  <a href="products.html">Nowości</a>
  <a href="products.html">Promocje</a>
  <a href="products.html">Kolekcjonerskie</a>
</nav>

<main>
  <h2>Wyniki wyszukiwania</h2>
  <div class="products">
    <div class="product">
      <img src="images/nes.webp" alt="NES Classic Edition" loading="lazy">
      <h3>NES Classic Edition</h3>
      <p class="price">399 zł</p>
    </div>
    <div class="product">
      <img src="images/sega.webp" alt="Sega Mega Drive Mini" loading="lazy">
      <h3>Sega Mega Drive Mini</h3>
      <p class="price">449 zł</p>
    </div>
    <div class="product">
      <img src="images/ps1.webp" alt="PlayStation Classic" loading="lazy">
      <h3>PlayStation Classic</h3>
      <p class="price">429 zł</p>
    </div>
    <div class="product">
      <img src="images/atari.webp" alt="Atari Flashback" loading="lazy">
      <h3>Atari Flashback</h3>
      <p class="price">299 zł</p>
    </div>
  </div>
</main>

<footer>
  &copy; 2026 RetroZone – wszystkie prawa zastrzeżone.
</footer>

<script src="main.js" defer></script>
